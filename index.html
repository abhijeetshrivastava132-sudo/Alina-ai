<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alina</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;overflow:hidden}body{font-family:"Courier New","Lucida Console",monospace;color:#00ff66}.app{width:100vw;height:100vh;position:relative;background:#000;display:none}.app.active{display:block}.app:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 5px,rgba(0,255,102,.025) 6px);pointer-events:none}.login-screen{position:fixed;inset:0;background:#000;display:grid;place-items:center;padding:18px}.login-card{width:min(380px,100%);border:1px solid rgba(0,255,102,.35);padding:22px;background:rgba(0,12,4,.7);box-shadow:0 0 24px rgba(0,255,102,.12)}.login-card h1{font-size:16px;letter-spacing:.12em;margin-bottom:18px;text-shadow:0 0 8px rgba(0,255,102,.75)}.login-actions{display:grid;gap:10px}.login-error{min-height:18px;margin-top:12px;font-size:12px;color:rgba(0,255,102,.75);line-height:1.4}.code-box{display:grid;gap:10px;margin-top:12px}.code-box.hidden{display:none}.code-box input{width:100%;padding:9px 12px;background:rgba(0,20,6,.65);border:1px solid rgba(0,255,102,.5);color:#00ff66;font-family:inherit;font-size:13px;letter-spacing:.15em}.code-box input:focus{outline:none;box-shadow:0 0 8px rgba(0,255,102,.35)}.top-left{position:fixed;top:18px;left:18px;z-index:5;display:flex;flex-direction:column;align-items:flex-start;gap:12px}.name{font-size:14px;letter-spacing:.08em;text-shadow:0 0 8px rgba(0,255,102,.75)}.status{font-size:12px;letter-spacing:.12em;color:rgba(0,255,102,.65);text-shadow:0 0 8px rgba(0,255,102,.35)}.controls{display:flex;gap:8px;flex-wrap:wrap}button{padding:8px 13px;border:1px solid rgba(0,255,102,.5);background:rgba(0,20,6,.65);color:#00ff66;font-family:inherit;font-size:12px;letter-spacing:.08em;cursor:pointer}button:hover{background:rgba(0,255,102,.12)}.logout-btn{width:100%;margin-top:12px;margin-bottom:calc(8px + env(safe-area-inset-bottom));flex:0 0 auto;position:sticky;bottom:calc(6px + env(safe-area-inset-bottom));z-index:20;background:#001405}.menu-btn{position:fixed;top:18px;right:18px;z-index:9;width:42px;height:34px;padding:0;font-size:18px;line-height:1}.history-panel{position:fixed;top:0;right:0;z-index:8;width:min(330px,86vw);height:100dvh;padding:68px 14px calc(10px + env(safe-area-inset-bottom));border-left:1px solid rgba(0,255,102,.25);background:rgba(0,8,3,.94);box-shadow:-20px 0 40px rgba(0,0,0,.7);transform:translateX(100%);transition:transform .22s ease;overflow:hidden;display:flex;flex-direction:column}.history-panel.open{transform:translateX(0)}.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:rgba(0,255,102,.82);font-size:13px;letter-spacing:.12em;flex:0 0 auto}.clear-btn{padding:7px 10px;font-size:11px}.history-list{flex:1 1 auto;min-height:0;overflow:auto;padding-right:4px;padding-bottom:26px}.history-item{padding:10px 0;border-bottom:1px solid rgba(0,255,102,.14);font-size:12px;line-height:1.45;color:rgba(0,255,102,.85)}.history-item b{display:block;margin-bottom:4px;color:#00ff66;font-weight:400}.history-item span{display:block;color:rgba(0,255,102,.58)}.terminal{position:fixed;left:18px;right:18px;top:132px;bottom:18px;width:auto;padding:18px;border:1px solid rgba(0,255,102,.22);background:rgba(0,12,4,.62);box-shadow:0 0 18px rgba(0,255,102,.08);overflow-y:auto;display:flex;flex-direction:column}.line{font-size:15px;line-height:1.7;color:rgba(0,255,102,.9);text-shadow:0 0 8px rgba(0,255,102,.28);word-break:break-word}.dim{color:rgba(0,255,102,.55)}.listening .name:after{content:" _";animation:blink .8s infinite}.modal{position:fixed;inset:0;z-index:99;display:grid;place-items:center;padding:18px;background:rgba(0,0,0,.72)}.modal.hidden{display:none}.modal-card{width:min(340px,100%);border:1px solid rgba(0,255,102,.45);background:rgba(0,12,4,.96);box-shadow:0 0 35px rgba(0,255,102,.18);padding:18px}.modal-card h2{font-size:14px;letter-spacing:.12em;margin-bottom:10px;text-shadow:0 0 8px rgba(0,255,102,.75)}.modal-card p{font-size:12px;line-height:1.5;color:rgba(0,255,102,.72);margin-bottom:16px}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.danger-btn{border-color:rgba(0,255,102,.7);background:rgba(0,255,102,.12)}@keyframes blink{0%,45%{opacity:1}46%,100%{opacity:0}}@supports not (height:100dvh){.history-panel{height:100vh}}@media(max-width:600px){.terminal{top:152px;left:14px;right:14px;bottom:14px}.history-panel{width:88vw}.logout-btn{margin-bottom:calc(10px + env(safe-area-inset-bottom));bottom:calc(8px + env(safe-area-inset-bottom))}}
</style>
</head>
<body>
<section class="login-screen" id="loginScreen"><div class="login-card"><h1>Login</h1><div class="login-actions"><button id="deltaBtn">DELTA</button></div><div class="code-box hidden" id="codeBox"><input type="password" id="codeInput" placeholder="ENTER CODE" maxlength="10" /><button id="submitCodeBtn">ENTER</button></div><p class="login-error" id="loginError"></p></div></section>
<main class="app" id="app"><div class="top-left"><div class="name">Alina</div><div class="controls"><button id="listenBtn">LISTEN</button><button id="stopBtn">STOP</button></div><div class="status" id="status">READY</div></div><button class="menu-btn" id="menuBtn">☰</button><aside class="history-panel" id="historyPanel"><div class="history-head"><span>HISTORY</span><button class="clear-btn" id="clearHistoryBtn">CLEAR</button></div><div class="history-list" id="historyList"></div><button class="logout-btn" id="logoutBtn">LOGOUT</button></aside><section class="terminal" id="terminal"><p class="line dim">&gt; Alina initialized</p><p class="line dim">&gt; Click LISTEN and speak</p></section></main>
<div class="modal hidden" id="logoutModal"><div class="modal-card"><h2>LOGOUT?</h2><p>Are you sure you want to logout from Alina?</p><div class="modal-actions"><button id="cancelLogoutBtn">CANCEL</button><button class="danger-btn" id="confirmLogoutBtn">LOGOUT</button></div></div></div>
<script type="module">
let collection,addDoc,getDocs,deleteDoc,query,orderBy,limit,serverTimestamp,getFirestore,db,firebaseReady=false;
async function loadFirebase(){
  try{
    const appMod=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
    const fsMod=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
    ({getFirestore,collection,addDoc,getDocs,deleteDoc,query,orderBy,limit,serverTimestamp}=fsMod);
    const firebaseConfig=JSON.parse(atob('eyJhcGlLZXkiOiJBSXphU3lCRnJWXzRKTk1FYTVLeW40T05nR1U2VFgzZm1fUFBHMTQiLCJhdXRoRG9tYWluIjoiYWxpbmEtOTgxMGQuZmlyZWJhc2VhcHAuY29tIiwicHJvamVjdElkIjoiYWxpbmEtOTgxMGQiLCJzdG9yYWdlQnVja2V0IjoiYWxpbmEtOTgxMGQuZmlyZWJhc2VzdG9yYWdlLmFwcCIsIm1lc3NhZ2luZ1NlbmRlcklkIjoiMjUyNDI0MDExODEwIiwiYXBwSWQiOiIxOjI1MjQyNDAxMTgxMDp3ZWI6N2IzNjgyNDQ2OGU5YTU1MjExY2E3YiIsIm1lYXN1cmVtZW50SWQiOiJHLVpSTTBaMTJTNVcifQ=='));
    const firebaseApp=appMod.initializeApp(firebaseConfig);
    db=getFirestore(firebaseApp);
    firebaseReady=true;
  }catch(err){
    console.error('Firebase load failed:',err);
    firebaseReady=false;
  }
}
loadFirebase();
const $=id=>document.getElementById(id);const app=$('app'),loginScreen=$('loginScreen'),deltaBtn=$('deltaBtn'),codeBox=$('codeBox'),codeInput=$('codeInput'),submitCodeBtn=$('submitCodeBtn'),logoutBtn=$('logoutBtn'),loginError=$('loginError'),statusEl=$('status'),terminal=$('terminal'),listenBtn=$('listenBtn'),stopBtn=$('stopBtn'),menuBtn=$('menuBtn'),historyPanel=$('historyPanel'),historyList=$('historyList'),clearHistoryBtn=$('clearHistoryBtn'),logoutModal=$('logoutModal'),cancelLogoutBtn=$('cancelLogoutBtn'),confirmLogoutBtn=$('confirmLogoutBtn');
const ACCESS_CODE='260709';
const SHARED_SPACE='delta-shared';
const AUTH_KEY='alina_auth';
function userMessagesRef(){return collection(db,'users',SHARED_SPACE,'messages')}
const API_URL='/api/chat',SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;let recognition=null,history=[];
function line(t,d=false){const p=document.createElement('p');p.className=d?'line dim':'line';p.textContent=t;terminal.appendChild(p);while(terminal.children.length>40)terminal.removeChild(terminal.firstElementChild);terminal.scrollTop=terminal.scrollHeight}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function renderHistory(){historyList.innerHTML='';if(!history.length){historyList.innerHTML='<p class="history-item"><span>No history yet</span></p>';return}history.forEach(item=>{const div=document.createElement('div');div.className='history-item';div.innerHTML='<b>&gt; '+escapeHtml(item.q)+'</b><span>'+escapeHtml(item.a)+'</span>';historyList.appendChild(div)})}
async function loadHistory(){try{const q=query(userMessagesRef(),orderBy('createdAt','desc'),limit(30));const snap=await getDocs(q);history=snap.docs.map(d=>({id:d.id,...d.data()}));renderHistory()}catch(err){historyList.innerHTML='<p class="history-item"><span>Firestore error: '+escapeHtml(err.message)+'</span></p>'}}
async function saveHistory(q,a){try{await addDoc(userMessagesRef(),{q,a,createdAt:serverTimestamp()});await loadHistory()}catch(err){line('> history save error: '+err.message,true)}}
async function clearHistory(){try{const q=query(userMessagesRef(),orderBy('createdAt','desc'),limit(30));const snap=await getDocs(q);await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));history=[];renderHistory()}catch(err){line('> clear history error: '+err.message,true)}}
let speechUnlocked=false;function unlockSpeech(){if(speechUnlocked)return;speechUnlocked=true;try{const u=new SpeechSynthesisUtterance('');u.volume=0;speechSynthesis.speak(u)}catch(e){}}
setInterval(()=>{if(speechSynthesis.speaking&&speechSynthesis.paused)speechSynthesis.resume()},9000);
let cachedVoices=[];
function loadVoices(){return new Promise(resolve=>{const v=speechSynthesis.getVoices();if(v&&v.length){cachedVoices=v;resolve(v);return}speechSynthesis.onvoiceschanged=()=>{cachedVoices=speechSynthesis.getVoices();resolve(cachedVoices)};setTimeout(()=>resolve(speechSynthesis.getVoices()),1200)})}
loadVoices();
function pickVoice(){const voices=cachedVoices.length?cachedVoices:speechSynthesis.getVoices();if(!voices||!voices.length)return null;let v=voices.find(v=>v.lang==='en-IN'&&/female/i.test(v.name));if(!v)v=voices.find(v=>v.lang==='en-IN');if(!v)v=voices.find(v=>/^en-(GB|US|AU)/.test(v.lang)&&/female/i.test(v.name));if(!v)v=voices.find(v=>v.lang&&v.lang.startsWith('en'));return v||voices[0]}
async function say(t){if(!('speechSynthesis' in window)){line('> voice not supported in this browser',true);return}speechSynthesis.cancel();if(!cachedVoices.length)await loadVoices();const u=new SpeechSynthesisUtterance(t);const voice=pickVoice();if(voice)u.voice=voice;u.lang=voice&&voice.lang?voice.lang:'en-IN';u.rate=.95;u.pitch=1;u.onstart=()=>{statusEl.textContent='SPEAKING'};u.onerror=e=>{line('> speech error: '+e.error,true);statusEl.textContent='READY'};u.onend=()=>{statusEl.textContent='READY'};speechSynthesis.speak(u)}
async function askAI(msg){try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});let d={};try{d=await r.json()}catch(err){}if(!r.ok)return 'Backend error: '+(d.detail||d.error||('HTTP '+r.status));return d.reply||'No reply received.'}catch(err){return 'Network error: '+err.message}}
async function handle(text){line('> you: '+text);statusEl.textContent='THINKING';const reply=await askAI(text);line('> alina: '+reply);await saveHistory(text,reply);statusEl.textContent='READY';say(reply)}
function listen(){unlockSpeech();if(!SpeechRecognition){line('> browser speech recognition support nahi karta');say('Speech recognition is not supported.');return}recognition=new SpeechRecognition();recognition.lang='en-IN';recognition.interimResults=false;recognition.continuous=false;recognition.onstart=()=>{app.classList.add('listening');statusEl.textContent='LISTENING';line('> listening...',true)};recognition.onresult=e=>handle(e.results[0][0].transcript);recognition.onerror=()=>{statusEl.textContent='ERROR';line('> mic permission error')};recognition.onend=()=>{app.classList.remove('listening');if(statusEl.textContent==='LISTENING')statusEl.textContent='READY'};recognition.start()}function stopAll(){if(recognition)recognition.stop();speechSynthesis.cancel();app.classList.remove('listening');statusEl.textContent='READY';line('> stopped',true)}
function openLogoutModal(){logoutModal.classList.remove('hidden')}function closeLogoutModal(){logoutModal.classList.add('hidden')}
function lockApp(){app.classList.remove('active');loginScreen.style.display='grid';codeBox.classList.add('hidden');loginError.textContent='';history=[];renderHistory()}
function confirmLogout(){try{localStorage.removeItem(AUTH_KEY)}catch(e){}closeLogoutModal();lockApp()}
function openCodeBox(){codeBox.classList.remove('hidden');loginError.textContent='';codeInput.value='';codeInput.focus()}
function grantAccess(){loginError.textContent='';loginScreen.style.display='none';app.classList.add('active');line('> access granted',true);loadHistory()}
function submitCode(){const val=codeInput.value.trim();if(val===ACCESS_CODE){try{localStorage.setItem(AUTH_KEY,'1')}catch(e){}grantAccess()}else{loginError.textContent='WRONG CODE';codeInput.value=''}}
logoutBtn.onclick=openLogoutModal;cancelLogoutBtn.onclick=closeLogoutModal;confirmLogoutBtn.onclick=confirmLogout;logoutModal.onclick=e=>{if(e.target===logoutModal)closeLogoutModal()};listenBtn.onclick=listen;stopBtn.onclick=stopAll;menuBtn.onclick=()=>historyPanel.classList.toggle('open');clearHistoryBtn.onclick=clearHistory;deltaBtn.onclick=openCodeBox;submitCodeBtn.onclick=submitCode;codeInput.onkeydown=e=>{if(e.key==='Enter')submitCode()};
(function autoLogin(){try{if(localStorage.getItem(AUTH_KEY)==='1'){grantAccess()}}catch(e){}})();
</script>
</body>
