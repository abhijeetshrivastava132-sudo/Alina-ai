<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alina</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
body{font-family:"Courier New","Lucida Console",monospace;color:#00ff66}
.app{width:100vw;height:100vh;position:relative;background:radial-gradient(circle at center,rgba(0,255,102,.06),transparent 35%),#000}
.app:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 5px,rgba(0,255,102,.035) 6px);pointer-events:none}
.name{position:fixed;top:18px;left:18px;font-size:14px;letter-spacing:.08em;text-shadow:0 0 8px rgba(0,255,102,.75);z-index:5}
.center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px}
.orb{width:165px;height:165px;border-radius:50%;border:1px solid rgba(0,255,102,.55);display:grid;place-items:center;box-shadow:0 0 25px rgba(0,255,102,.25),inset 0 0 35px rgba(0,255,102,.14);position:relative}
.orb:before,.orb:after{content:"";position:absolute;border-radius:50%;border:1px dashed rgba(0,255,102,.45)}
.orb:before{inset:18px;animation:spin 12s linear infinite}.orb:after{inset:42px;animation:spinR 8s linear infinite}
.dot{width:42px;height:42px;border-radius:50%;background:#00ff66;box-shadow:0 0 25px #00ff66,0 0 70px rgba(0,255,102,.7);animation:pulse 1.5s ease-in-out infinite}
.status{font-size:13px;letter-spacing:.14em;color:rgba(0,255,102,.75);text-shadow:0 0 8px rgba(0,255,102,.4)}
.controls{display:flex;gap:12px}button{padding:11px 18px;border:1px solid rgba(0,255,102,.5);background:rgba(0,20,6,.75);color:#00ff66;font-family:inherit;font-size:13px;letter-spacing:.08em;cursor:pointer}button:hover{background:rgba(0,255,102,.12)}
.terminal{position:fixed;left:18px;bottom:18px;width:min(720px,calc(100vw - 36px));max-height:42vh;padding:14px;border:1px solid rgba(0,255,102,.25);background:rgba(0,12,4,.72);box-shadow:0 0 18px rgba(0,255,102,.1);overflow:hidden}
.line{font-size:13px;line-height:1.55;color:rgba(0,255,102,.9);text-shadow:0 0 8px rgba(0,255,102,.32);word-break:break-word}.dim{color:rgba(0,255,102,.55)}
.listening .dot{animation-duration:.5s}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes spinR{to{transform:rotate(-360deg)}}@keyframes pulse{0%,100%{transform:scale(.86);opacity:.7}50%{transform:scale(1.08);opacity:1}}
</style>
</head>
<body>
<main class="app" id="app">
<div class="name">Alina</div>
<section class="center">
<div class="orb"><div class="dot"></div></div>
<div class="status" id="status">READY</div>
<div class="controls"><button id="listenBtn">LISTEN</button><button id="stopBtn">STOP</button></div>
</section>
<section class="terminal" id="terminal"><p class="line dim">&gt; Alina initialized</p><p class="line dim">&gt; Click LISTEN and speak</p></section>
</main>
<script>
const app=document.getElementById('app');
const statusEl=document.getElementById('status');
const terminal=document.getElementById('terminal');
const listenBtn=document.getElementById('listenBtn');
const stopBtn=document.getElementById('stopBtn');
const API_URL='/api/chat';
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null;
function line(t,d=false){const p=document.createElement('p');p.className=d?'line dim':'line';p.textContent=t;terminal.appendChild(p);while(terminal.children.length>8)terminal.removeChild(terminal.firstElementChild)}
function say(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-IN';u.rate=.95;speechSynthesis.speak(u)}
async function askAI(msg){try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});if(!r.ok)throw new Error('backend missing');const d=await r.json();return d.reply||'No reply received.'}catch(e){return 'Voice system ready hai. AI reply ke liye backend API connect karna hoga.'}}
async function handle(text){line('> you: '+text);statusEl.textContent='THINKING';const reply=await askAI(text);line('> alina: '+reply);statusEl.textContent='READY';say(reply)}
function listen(){if(!SpeechRecognition){line('> browser speech recognition support nahi karta');say('Speech recognition is not supported.');return}recognition=new SpeechRecognition();recognition.lang='en-IN';recognition.interimResults=false;recognition.continuous=false;recognition.onstart=()=>{app.classList.add('listening');statusEl.textContent='LISTENING';line('> listening...',true)};recognition.onresult=e=>handle(e.results[0][0].transcript);recognition.onerror=()=>{statusEl.textContent='ERROR';line('> mic permission error')};recognition.onend=()=>{app.classList.remove('listening');if(statusEl.textContent==='LISTENING')statusEl.textContent='READY'};recognition.start()}
function stopAll(){if(recognition)recognition.stop();speechSynthesis.cancel();app.classList.remove('listening');statusEl.textContent='READY';line('> stopped',true)}
listenBtn.onclick=listen;stopBtn.onclick=stopAll;
</script>
</body>
</html>
